name: Node CI

on:
  push:
    branches:
      - main

jobs:
  build and test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Application
        run: npm start

      - name: Run Tests
        run: npm test